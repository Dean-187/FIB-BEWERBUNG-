<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIB Leader Bewerbung ULTRA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0f1c;
    color: #e6f0ff;
}

nav {
    position: sticky;
    top: 0;
    background: #0a0f1c;
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #00aaff;
}
nav a {
    color: #00aaff;
    margin: 0 10px;
    text-decoration: none;
}

header {
    text-align: center;
    padding: 50px;
    background: linear-gradient(120deg, #0d1b2a, #1b263b);
}

.section {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    border-left: 5px solid #00aaff;
}

textarea, input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #0a0f1c;
    border: 1px solid #00aaff;
    color: white;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #00aaff;
    border: none;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<nav>
<a href="#about">Über mich</a>
<a href="#team">Team</a>
<a href="#concept">Konzept</a>
</nav>

<header>
<h1>FIB Leader Bewerbung</h1>
</header>

<div class="section" id="content">

<div class="card">
<h2>Über mich</h2>
<textarea id="about"></textarea>
</div>

<div class="card">
<h2>Motivation</h2>
<textarea id="motivation"></textarea>
</div>

<div class="card">
<h2>Team</h2>
<table id="table">
<tr><th>Rang</th><th>Aufgabe</th><th>Name</th><th>❌</th></tr>
</table>
<button onclick="addRow()">+ hinzufügen</button>
</div>

<div class="card">
<h2>Konzept</h2>
<textarea id="concept"></textarea>
</div>

<button onclick="saveData()">💾 Speichern</button>
<button onclick="loadData()">📂 Laden</button>
<button onclick="downloadPDF()">📄 PDF Export</button>

</div>

<script>
// Tabelle erweitern
function addRow() {
    let table = document.getElementById("table");
    let row = table.insertRow();

    for (let i = 0; i < 3; i++) {
        let cell = row.insertCell(i);
        cell.innerHTML = "<input>";
    }

    let del = row.insertCell(3);
    del.innerHTML = "<button onclick='this.parentElement.parentElement.remove()'>X</button>";
}

// Speichern
function saveData() {
    let data = {
        about: document.getElementById("about").value,
        motivation: document.getElementById("motivation").value,
        concept: document.getElementById("concept").value,
        table: document.getElementById("table").innerHTML
    };
    localStorage.setItem("fibData", JSON.stringify(data));
    alert("Gespeichert!");
}

// Laden
function loadData() {
    let data = JSON.parse(localStorage.getItem("fibData"));
    if (!data) return alert("Keine Daten gefunden");

    document.getElementById("about").value = data.about;
    document.getElementById("motivation").value = data.motivation;
    document.getElementById("concept").value = data.concept;
    document.getElementById("table").innerHTML = data.table;
}

// PDF Export
function downloadPDF() {
    let element = document.getElementById("content");
    html2pdf().from(element).save("FIB_Bewerbung.pdf");
}
</script>

</body>
</html>
